          """

          js = """
          (() => {
            const modules = __MODULES__;

            const searchInput = document.getElementById("docSearchInput");
            const resultsBox = document.getElementById("docSearchResults");
            const mobileMenu = document.getElementById("docMobileMenu");
            const sidebar = document.getElementById("docSidebar");

            if (mobileMenu && sidebar) {
              mobileMenu.addEventListener("click", () => {
                sidebar.classList.toggle("open");
              });
            }

            const searchable = [];
            modules.forEach((module) => {
              searchable.push({
                title: module.title,
                subtitle: "Module overview",
                url: `/documentation/${module.slug}/`
              });

              module.pages.forEach((page) => {
                searchable.push({
                  title: page.title,
                  subtitle: module.title,
                  url: `/documentation/${module.slug}/${page.slug}.html`
                });
              });
            });

            function hideResults() {
              if (resultsBox) {
                resultsBox.hidden = true;
                resultsBox.innerHTML = "";
              }
            }

            if (searchInput && resultsBox) {
              searchInput.addEventListener("input", () => {
                const query = searchInput.value.trim().toLowerCase();

                if (query.length < 2) {
                  hideResults();
                  return;
                }

                const matches = searchable
                  .filter((item) =>
                    `${item.title} ${item.subtitle}`.toLowerCase().includes(query)
                  )
                  .slice(0, 14);

                resultsBox.innerHTML = matches.length
                  ? matches.map((item) => `
                    <a class="doc-search-result" href="${item.url}">
                      <strong>${item.title}</strong>
                      <small>${item.subtitle}</small>
                    </a>
                  `).join("")
                  : `<div class="doc-search-result">
                      <strong>No documentation found</strong>
                      <small>Try another keyword.</small>
                    </div>`;

                resultsBox.hidden = false;
              });

              document.addEventListener("click", (event) => {
                if (!resultsBox.contains(event.target) &&
                    !searchInput.contains(event.target)) {
                  hideResults();
                }
              });

              document.addEventListener("keydown", (event) => {
                if (event.key === "Escape") {
                  hideResults();
                }
              });
            }
          })();
          """.replace(
              "__MODULES__",
              json.dumps(
                  [
                      {
                          "slug": m["slug"],
                          "title": m["title"],
                          "pages": [
                              {"slug": slug, "title": title}
                              for slug, title in m["pages"]
                          ],
                      }
                      for m in modules
                  ]
              ),
          )

          write_generated(ASSETS / "documentation.css", css.strip() + "\n")
          write_generated(ASSETS / "documentation.js", js.strip() + "\n")

          home_cards = "\n".join(
              f"""
              <a class="doc-module-card" href="/documentation/{m['slug']}/">
                <small>{m['number']}</small>
                <strong>{escape(m['title'])}</strong>
                <p>{len(m['pages'])} documentation pages prepared.</p>
              </a>
              """
              for m in modules
          )

          home_body = f"""
          <div class="doc-notice doc-notice-info">
            <strong>Enterprise Documentation Framework</strong>
            <p>This portal is the central source of product, administration,
               development, QA, API, HIPAA and operational documentation for
               True Care System.</p>
          </div>

          <section class="doc-section">
            <h2>Documentation Categories</h2>
            <p>Select a category to view its prepared documentation pages.</p>
            <div class="doc-module-grid">
              {home_cards}
            </div>
          </section>

          <section class="doc-section">
            <h2>Living Documentation Standard</h2>
            <p>A feature is considered complete only when applicable code,
               testing, user guidance, technical notes, API documentation,
               HIPAA considerations and audit behavior are updated together.</p>
          </section>
          """

          write_generated(
              ROOT / "index.html",
              page_template(
                  "True Care System Documentation",
                  None,
                  home_body,
                  "TCS-DOC-000",
                  "Active",
              ),
          )

          for module in modules:
              module_dir = ROOT / module["slug"]
              images_dir = module_dir / "images"
              images_dir.mkdir(parents=True, exist_ok=True)

              write_if_missing(
                  images_dir / "README.md",
                  f"""# {module["title"]} Screenshot Library

          Store screenshots for the **{module["title"]}** documentation in this folder.

          Naming format:

          `{module["prefix"]}-001-description.jpg`

          Requirements:

          - Use demo or training data only.
          - Do not upload real PHI.
          - Do not expose passwords, API credentials, SSNs or full Medicaid IDs.
          - Capture desktop screens at 100% browser zoom unless otherwise documented.
          - Keep screenshot IDs stable when replacing an outdated image.
          """,
              )

              page_links = "\n".join(
                  f'<li><a href="/documentation/{module["slug"]}/{slug}.html">'
                  f'{escape(title)}</a></li>'
                  for slug, title in module["pages"]
              )

              module_body = f"""
              <div class="doc-notice doc-notice-info">
                <strong>Module documentation structure created</strong>
                <p>Each page below contains the standard enterprise template and
                   a named screenshot placeholder.</p>
              </div>

              <section class="doc-section">
                <h2>Purpose</h2>
                <p>This section will contain the approved documentation for
                   {escape(module["title"])}.</p>
              </section>

              <section class="doc-section">
                <h2>Documentation Pages</h2>
                <ul class="doc-page-list">
                  {page_links}
                </ul>
              </section>

              <section class="doc-section">
                <h2>Screenshot Library</h2>
                <p>Images for this module are stored in
                   <code>documentation/{module["slug"]}/images/</code>.</p>
              </section>
              """

              write_generated(
                  module_dir / "index.html",
                  page_template(
                      module["title"],
                      module,
                      module_body,
                      f'{module["prefix"]}-DOC-000',
                      "Structure Created",
                  ),
              )

              for index, (page_slug, page_title) in enumerate(
                  module["pages"], start=1
              ):
                  body = standard_page_body(
                      module, page_slug, page_title, index
                  )
                  write_generated(
                      module_dir / f"{page_slug}.html",
                      page_template(
                          page_title,
                          module,
                          body,
                          f'{module["prefix"]}-DOC-{index:03d}',
                          "Planned",
                      ),
                  )

          print("")
          print("True Care System Documentation Portal generated successfully.")
          print(f"Modules: {len(modules)}")
          print(
              "Pages:",
              sum(len(module["pages"]) + 1 for module in modules) + 1
          )
          PYTHON

      - name: Show generated structure
        run: |
          echo "Documentation folders:"
          find documentation -maxdepth 2 -type d | sort

          echo ""
          echo "Generated HTML page count:"
          find documentation -type f -name "*.html" | wc -l

      - name: Commit generated documentation
        shell: bash
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No new documentation files were created."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add documentation
          git commit -m "Align documentation portal with complete product navigation"
          git push
