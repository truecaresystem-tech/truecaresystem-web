          def write_generated(path: Path, content: str):
              path.parent.mkdir(parents=True, exist_ok=True)
              action = "UPDATE" if path.exists() else "CREATE"
              path.write_text(content, encoding="utf-8")
              print(f"{action}: {path}")

          def write_if_missing(path: Path, content: str):
              path.parent.mkdir(parents=True, exist_ok=True)
              if path.exists():
                  print(f"PRESERVE existing: {path}")
                  return
              path.write_text(content, encoding="utf-8")
              print(f"CREATE: {path}")

          def sidebar_html(current_slug=None):
              items = []
              for module in modules:
                  active = " active" if module["slug"] == current_slug else ""
                  items.append(
                      f'<a class="doc-nav-module{active}" '
                      f'href="/documentation/{module["slug"]}/">'
                      f'<span class="doc-nav-number">{module["number"]}</span>'
                      f'<span>{escape(module["title"])}</span></a>'
                  )
              return "\n".join(items)

          def page_template(title, module, body, page_id="", status="Planned"):
              return f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="description" content="{escape(title)} documentation for True Care System">
            <title>{escape(title)} | True Care System Documentation</title>
            <link rel="stylesheet" href="/documentation/assets/documentation.css">
          </head>
          <body>
            <header class="doc-header">
              <a class="doc-brand" href="/documentation/">
                <img src="/logo.png" alt="True Care System">
                <span>
                  <strong>True Care System</strong>
                  <small>Documentation</small>
                </span>
              </a>

              <button class="doc-mobile-menu" id="docMobileMenu"
                      aria-label="Open documentation menu">☰</button>

              <div class="doc-header-actions">
                <label class="doc-search">
                  <span>⌕</span>
                  <input id="docSearchInput" type="search"
                         placeholder="Search documentation..."
                         autocomplete="off">
                </label>
                <a href="/" class="doc-back-link">Return to Website</a>
              </div>
            </header>

            <div class="doc-layout">
              <aside class="doc-sidebar" id="docSidebar">
                <div class="doc-sidebar-title">Documentation</div>
                <nav>
                  {sidebar_html(module["slug"] if module else None)}
                </nav>
              </aside>

              <main class="doc-main">
                <div class="doc-breadcrumb">
                  <a href="/documentation/">Documentation</a>
                  {"<span>›</span><a href='/documentation/" + module["slug"] + "/'>" + escape(module["title"]) + "</a>" if module else ""}
                  {"<span>›</span><span>" + escape(title) + "</span>" if module else ""}
                </div>

                <article class="doc-article">
                  <header class="doc-article-header">
                    <div>
                      <p class="doc-eyebrow">TRUE CARE SYSTEM DOCUMENTATION</p>
                      <h1>{escape(title)}</h1>
                    </div>

                    <dl class="doc-metadata">
                      <div><dt>Document ID</dt><dd>{escape(page_id or "TCS-DOC")}</dd></div>
                      <div><dt>Version</dt><dd>1.0</dd></div>
                      <div><dt>Status</dt><dd>{escape(status)}</dd></div>
                      <div><dt>Last Updated</dt><dd>Pending</dd></div>
                    </dl>
                  </header>

                  {body}
                </article>

                <footer class="doc-page-footer">
                  <p>© 2026 True Care System. All rights reserved.</p>
                  <p>Documentation is maintained as part of the True Care System product lifecycle.</p>
                </footer>
              </main>
            </div>

            <div class="doc-search-results" id="docSearchResults" hidden></div>
            <script src="/documentation/assets/documentation.js"></script>
          </body>
          </html>
          """

          def screenshot_placeholder(prefix, number, slug, title):
              screenshot_id = f"{prefix}-{number:03d}"
              filename = f"{screenshot_id}-{slug}.jpg"
              return f"""
              <section class="doc-section">
                <h2>Screenshot</h2>
                <div class="doc-screenshot-placeholder">
                  <div class="doc-placeholder-icon">▧</div>
                  <div>
                    <strong>Screenshot Required</strong>
                    <p><b>Screenshot ID:</b> {screenshot_id}</p>
                    <p><b>Screen:</b> {escape(title)}</p>
                    <p><b>File:</b> images/{filename}</p>
                    <p><b>Recommended capture:</b> Desktop, 100% browser zoom,
                       full page title, navigation, actions, filters and data area visible.</p>
                    <p><b>Privacy requirement:</b> Use demo or training data only.
                       Do not include real PHI, credentials, passwords, SSNs or Medicaid IDs.</p>
                  </div>
                </div>
              </section>
              """

          def standard_page_body(module, page_slug, page_title, page_number):
              return f"""
              <div class="doc-notice doc-notice-info">
                <strong>Documentation placeholder</strong>
