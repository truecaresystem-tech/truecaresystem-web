<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | True Care System</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #0f1f4b;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      width: 120px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #cbd5f5;
    }

    .btn {
      margin-top: 30px;
      display: inline-block;
      padding: 14px 28px;
      background: #5cc47b;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      background: #4bb36a;
    }
  </style>
</head>

<body>
  <div class="container">
    
    <div class="logo">
      <img src="logo.png" alt="True Care System Logo">

    <h1>Thank You!</h1>

    <p>
      Your request has been successfully submitted.<br>
      Our team will contact you shortly.
    </p>

    <p>
      We appreciate your interest in <strong>True Care System</strong>.
    </p>

    <a href="index.html" class="btn">Back to Home</a>
