<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>True Care System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      padding: 100px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      color: #22c55e;
    }

    p {
      font-size: 20px;
      color: #cbd5f5;
    }

    .btn {
      margin-top: 30px;
      padding: 15px 30px;
      background: #22c55e;
      border: none;
      color: black;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>True Care System</h1>
    <p>Care Management Solutions for Providers</p>

    <button class="btn" onclick="contact()">Contact Us</button>
  </div>

  <script>
    function contact() {
      window.location.href = "mailto:thetruecaresystem@gmail.com";
    }
  </script>
</body>
</html>
